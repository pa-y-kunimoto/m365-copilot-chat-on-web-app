services:
  backend:
    build: ./apps/backend
    ports:
      - "3000:3000"
    environment:
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-mock-client-id}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-mock-client-secret}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-mock-tenant-id}
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret}
      - REDIRECT_URI=${REDIRECT_URI:-http://localhost:8080/auth/callback}
      - MOCK_MODE=${MOCK_MODE:-true}

  frontend:
    build: ./apps/frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
