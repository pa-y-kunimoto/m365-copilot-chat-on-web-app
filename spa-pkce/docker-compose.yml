services:
  backend:
    build: ./apps/backend
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID:-}
        VITE_AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID:-}
        VITE_MOCK_MODE: ${VITE_MOCK_MODE:-true}
    ports:
      - "8080:80"
    depends_on:
      - backend
